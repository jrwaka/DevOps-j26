name: Linting

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch: 
jobs:
  linting: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
  
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12
  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
  
      - name: Run ruff
        run: ruff check .
        
      

    
    
    
    
    
